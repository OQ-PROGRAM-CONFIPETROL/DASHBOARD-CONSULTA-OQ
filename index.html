<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Consulta OQ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b2340;color:#fff;padding:20px}
.logoBox{display:flex;justify-content:center;margin-bottom:18px}
.logoBox img{max-width:260px;width:100%;background:#fff;padding:12px;border-radius:14px}
h1{text-align:center;margin-bottom:25px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:25px}
.card{background:#fff;color:#111;border-radius:14px;padding:18px;text-align:center;box-shadow:0 8px 18px rgba(0,0,0,.25)}
.card h2{font-size:15px;margin:0}
.valor{font-size:34px;font-weight:bold;margin-top:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:25px}
.box{background:#fff;color:#111;border-radius:14px;padding:18px}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:15px}
input,select{padding:10px;border-radius:8px;border:1px solid #ccc;width:100%}
table{width:100%;border-collapse:collapse;background:#fff;color:#111}
th,td{border:1px solid #ddd;padding:8px;font-size:13px;text-align:left}
th{background:#0b2340;color:#fff}
.badge{padding:4px 8px;border-radius:8px;font-weight:bold;background:#ddd}
.ACTIVO{background:#c8f7c5}
.INACTIVO{background:#ffc7c7}
.detalleCurso{background:#f4f7fb;padding:8px;border-radius:8px;margin:5px 0}
.detalleCurso a{font-weight:bold;color:#0b2340}
@media(max-width:900px){.grid{grid-template-columns:1fr} body{padding:10px} th,td{font-size:11px;padding:6px}}
</style>
</head>

<body>

<div class="logoBox">
  <img src="logo.png.png" alt="CONFIPETROL">
</div>

<h1>DASHBOARD CONSULTA OQ</h1>

<div class="cards">
  <div class="card"><h2>Total personas</h2><div class="valor" id="totalPersonas">0</div></div>
  <div class="card"><h2>Con cursos</h2><div class="valor" id="personasConCursos">0</div></div>
  <div class="card"><h2>Sin cursos</h2><div class="valor" id="personasSinCursos">0</div></div>
  <div class="card"><h2>Total capacitaciones</h2><div class="valor" id="totalCapacitaciones">0</div></div>
</div>

<div class="grid">
  <div class="box">
    <h3>Top 10 cursos más cargados</h3>
    <canvas id="graficaCursos"></canvas>
  </div>

  <div class="box">
    <h3>Personas por cargo</h3>
    <canvas id="graficaCargos"></canvas>
  </div>
</div>

<div class="box">
  <h3>Consulta de personal y capacitaciones</h3>

  <div class="filters">
    <input id="buscar" placeholder="Buscar persona, documento, cargo o curso..." oninput="renderTabla()">

    <select id="filtroCargo" onchange="renderTabla()">
      <option value="">Todos los cargos</option>
    </select>

    <select id="filtroEstado" onchange="renderTabla()">
      <option value="">Todos los estados</option>
      <option value="ACTIVO">Activo</option>
      <option value="INACTIVO">Inactivo</option>
    </select>

    <select id="filtroCurso" onchange="renderTabla()">
      <option value="">Todos los cursos</option>
    </select>

    <select id="filtroTieneCursos" onchange="renderTabla()">
      <option value="">Con o sin cursos</option>
      <option value="CON">Con cursos</option>
      <option value="SIN">Sin cursos</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Documento</th>
        <th>Cargo</th>
        <th>Estado</th>
        <th>Total cursos</th>
        <th>Capacitaciones / certificados</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxbzO1J8Dl0v4_NZ624FL9U7i4uIZzFhztAft7eyOWyQoGdR59VCxlpjUwrmgbIkZcKYA/exec";

let personasGlobal = [];

fetch(API + "?dashboardConsulta=oq")
.then(r => r.json())
.then(data => {
  personasGlobal = data.personas || [];

  document.getElementById("totalPersonas").textContent = data.totalPersonas;
  document.getElementById("personasConCursos").textContent = data.personasConCursos;
  document.getElementById("personasSinCursos").textContent = data.personasSinCursos;
  document.getElementById("totalCapacitaciones").textContent = data.totalCapacitaciones;

  cargarFiltros(personasGlobal);
  graficas(data);
  renderTabla();
})
.catch(err => {
  console.error(err);
  alert("No fue posible cargar la información.");
});

function cargarFiltros(personas){
  const cargos = [...new Set(personas.map(p => p.cargo).filter(Boolean))].sort();
  const cursos = [...new Set(personas.flatMap(p => (p.cursos || []).map(c => c.curso)).filter(Boolean))].sort();

  const filtroCargo = document.getElementById("filtroCargo");
  cargos.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    filtroCargo.appendChild(opt);
  });

  const filtroCurso = document.getElementById("filtroCurso");
  cursos.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    filtroCurso.appendChild(opt);
  });
}

function renderTabla(){
  const buscar = document.getElementById("buscar").value.toLowerCase();
  const cargo = document.getElementById("filtroCargo").value;
  const estado = document.getElementById("filtroEstado").value;
  const cursoFiltro = document.getElementById("filtroCurso").value;
  const tieneCursos = document.getElementById("filtroTieneCursos").value;

  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  const filtrados = personasGlobal.filter(p => {
    const cursosTexto = (p.cursos || []).map(c => c.curso).join(" ").toLowerCase();
    const texto = `${p.nombre} ${p.documento} ${p.cargo} ${cursosTexto}`.toLowerCase();

    const tieneCursoSeleccionado = !cursoFiltro || (p.cursos || []).some(c => c.curso === cursoFiltro);

    return (!buscar || texto.includes(buscar)) &&
           (!cargo || p.cargo === cargo) &&
           (!estado || p.estado === estado) &&
           tieneCursoSeleccionado &&
           (!tieneCursos || (tieneCursos === "CON" ? p.totalCursos > 0 : p.totalCursos === 0));
  });

  filtrados.forEach(p => {
    const cursosHTML = (p.cursos || []).length
      ? p.cursos.map(c => {
          const fecha = c.fecha ? formatearFecha(c.fecha) : "Sin fecha";
          const cert = c.certificado
            ? `<a href="${c.certificado}" target="_blank" rel="noopener noreferrer">Ver certificado</a>`
            : "Sin certificado";

          return `
            <div class="detalleCurso">
              <strong>${c.curso}</strong><br>
              Fecha: ${fecha}<br>
              ${cert}
            </div>
          `;
        }).join("")
      : "Sin capacitaciones cargadas";

    const claseEstado = p.estado === "ACTIVO" ? "ACTIVO" : "INACTIVO";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.nombre}</td>
      <td>${p.documento}</td>
      <td>${p.cargo}</td>
      <td><span class="badge ${claseEstado}">${p.estado || "—"}</span></td>
      <td>${p.totalCursos}</td>
      <td>${cursosHTML}</td>
    `;
    tbody.appendChild(tr);
  });
}

function formatearFecha(fecha){
  if (!fecha) return "";
  if (typeof fecha === "string") return fecha;
  return fecha;
}

function graficas(data){
  new Chart(document.getElementById("graficaCursos"), {
    type:"bar",
    data:{
      labels:(data.topCursos || []).map(x => cortarTexto(x.curso, 25)),
      datasets:[{
        label:"Cantidad",
        data:(data.topCursos || []).map(x => x.total)
      }]
    },
    options:{
      indexAxis:"y",
      responsive:true,
      plugins:{legend:{display:false}}
    }
  });

  new Chart(document.getElementById("graficaCargos"), {
    type:"bar",
    data:{
      labels:(data.cargos || []).slice(0,10).map(x => cortarTexto(x.cargo, 22)),
      datasets:[{
        label:"Personas",
        data:(data.cargos || []).slice(0,10).map(x => x.total)
      }]
    },
    options:{
      indexAxis:"y",
      responsive:true,
      plugins:{legend:{display:false}}
    }
  });
}

function cortarTexto(txt, max){
  return txt && txt.length > max ? txt.substring(0,max) + "..." : txt;
}
</script>

</body>
</html>
